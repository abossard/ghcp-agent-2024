<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Owner')}"><title>Owner</title></head>
<body>
  <nav th:replace="~{layout :: nav}"></nav>

  <main class="container">
    <h2 th:text="${owner.isNew() ? 'New Owner' : 'Edit Owner'}">Owner</h2>
    <form th:action="${owner.isNew() ? '/owners/new' : '/owners/' + owner.id + '/edit'}"
          th:object="${owner}" method="post" class="form">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" th:field="*{firstName}" id="firstName" class="form-control"/>
        <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error"></span>
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" th:field="*{lastName}" id="lastName" class="form-control"/>
        <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error"></span>
      </div>
      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" th:field="*{address}" id="address" class="form-control"/>
        <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="error"></span>
      </div>
      <div class="form-group">
        <label for="city">City</label>
        <input type="text" th:field="*{city}" id="city" class="form-control"/>
        <span th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="error"></span>
      </div>
      <div class="form-group">
        <label for="telephone">Telephone</label>
        <input type="text" th:field="*{telephone}" id="telephone" class="form-control"/>
        <span th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}" class="error"></span>
      </div>
      <button type="submit" class="btn btn-primary" th:text="${owner.isNew() ? 'Add Owner' : 'Update Owner'}">Submit</button>
    </form>
  </main>

  <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
