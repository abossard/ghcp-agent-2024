<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('New Visit')}"><title>Visit</title></head>
<body>
  <nav th:replace="~{layout :: nav}"></nav>

  <main class="container">
    <h2>New Visit</h2>
    <h3>Pet: <span th:text="${pet.name}"></span></h3>
    <h4>Owner: <span th:text="${owner.firstName + ' ' + owner.lastName}"></span></h4>

    <table th:if="${not #lists.isEmpty(pet.visits)}" class="table table-sm">
      <thead><tr><th>Date</th><th>Description</th></tr></thead>
      <tbody>
        <tr th:each="visit : ${pet.visits}">
          <td th:text="${visit.date}"></td>
          <td th:text="${visit.description}"></td>
        </tr>
      </tbody>
    </table>

    <form th:action="@{/owners/{ownerId}/pets/{petId}/visits/new(ownerId=${owner.id},petId=${pet.id})}"
          th:object="${visit}" method="post" class="form">
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" th:field="*{date}" id="date" class="form-control"/>
        <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="error"></span>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea th:field="*{description}" id="description" class="form-control" rows="3"></textarea>
        <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error"></span>
      </div>
      <button type="submit" class="btn btn-primary">Add Visit</button>
    </form>
  </main>

  <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
